<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo Nature Music Player</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6b4423">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/192/2589/2589174.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 視覺風格設定 */
        body {
            background-color: #f4ebd8;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            font-family: 'Kosugi Maru', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #2c4c3b;
        }

        .player-container {
            background: #fdfaf4;
            border: 14px solid #6b4423;
            border-radius: 40px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 20px 40px rgba(107, 68, 35, 0.3);
            padding: 30px;
            width: 320px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            color: #6b4423;
            margin: 0 0 5px 0;
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .header h2 {
            color: #2c4c3b;
            font-size: 15px;
            margin: 0 0 20px 0;
            font-weight: normal;
            opacity: 0.8;
        }

        .cover-art {
            background: #e8f0eb;
            width: 100%;
            height: 140px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 70px;
            color: #2c4c3b;
            margin-bottom: 20px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .track-title {
            font-size: 22px;
            font-weight: bold;
            color: #2c4c3b;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .progress-area {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #6b4423;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #87ceeb;
            box-shadow: 0 0 5px rgba(135, 206, 235, 0.6);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }
        .controls button {
            background: none;
            border: none;
            font-size: 20px;
            color: #6b4423;
            cursor: pointer;
            transition: color 0.2s, transform 0.1s;
            outline: none;
        }
        .controls .play-btn {
            font-size: 38px;
            color: #2c4c3b;
        }
        .controls .active-mode {
            color: #87ceeb !important;
        }

        .volume-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #6b4423;
        }

        .search-area input {
            width: 90%;
            padding: 10px 15px;
            border: 2px solid #d8e2dc;
            border-radius: 20px;
            font-family: inherit;
            outline: none;
            color: #2c4c3b;
            margin-bottom: 15px;
        }

        .playlist-area {
            max-height: 140px;
            overflow-y: auto;
            border-top: 1px dashed #d8e2dc;
            padding-top: 10px;
            text-align: left;
        }
        .playlist {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .playlist li {
            padding: 10px 15px;
            margin-bottom: 5px;
            border-radius: 12px;
            cursor: pointer;
            color: #6b4423;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .playlist li.active {
            background: #d4edda;
            color: #2c4c3b;
            font-weight: bold;
        }
        .playlist li.active .fa-leaf { display: inline-block; }
        .playlist li .fa-leaf { display: none; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header">
        <h1><i class="fas fa-leaf"></i> leo <i class="fas fa-seedling"></i></h1>
        <h2>MP3播放器 (PWA 版)</h2>
    </div>

    <div class="cover-art" id="coverArt">
        <i class="fas fa-tree" id="coverIcon"></i>
    </div>

    <div class="track-title" id="trackTitle">Track 01</div>

    <div class="progress-area">
        <div class="time-info">
            <span id="currentTime">0:00</span>
            <span id="durationTime">0:00</span>
        </div>
        <input type="range" id="progressBar" value="0" min="0" max="100">
    </div>

    <div class="controls">
        <button id="btnRepeat" title="不循環"><i class="fas fa-arrow-right"></i></button>
        <button id="btnPrev"><i class="fas fa-backward"></i></button>
        <button id="btnPlay" class="play-btn"><i class="fas fa-play-circle"></i></button>
        <button id="btnNext"><i class="fas fa-forward"></i></button>
        <button id="btnShuffle" title="隨機播放"><i class="fas fa-random"></i></button>
    </div>

    <div class="volume-area">
        <i class="fas fa-volume-down"></i>
        <input type="range" id="volumeBar" value="50" min="0" max="100">
        <i class="fas fa-volume-up"></i>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="搜尋編號或名稱...">
    </div>

    <div class="playlist-area">
        <ul class="playlist" id="playlist"></ul>
    </div>

    <audio id="audioPlayer"></audio>
</div>

<script>
    const musicFiles = [
        "https://raw.githubusercontent.com/hzy0213/music.mp3/main/song1.mp3",
        "https://raw.githubusercontent.com/hzy0213/music.mp3/main/song2.mp3",
        "https://raw.githubusercontent.com/hzy0213/music.mp3/main/song3.mp3"
    ];

    const natureIcons = ['fa-seedling', 'fa-cloud', 'fa-sun', 'fa-tree', 'fa-leaf', 'fa-dove', 'fa-frog', 'fa-mountain'];
    let currentIndex = 0, isPlaying = false, isShuffle = false, repeatMode = 0;

    const audio = document.getElementById('audioPlayer');
    const trackTitle = document.getElementById('trackTitle');
    const coverIcon = document.getElementById('coverIcon');
    const playBtn = document.getElementById('btnPlay');
    const progressBar = document.getElementById('progressBar');
    const volumeBar = document.getElementById('volumeBar');
    const playlistEl = document.getElementById('playlist');
    const searchInput = document.getElementById('searchInput');

    function initPlayer() {
        loadSong(currentIndex);
        updatePlaylistUI();
        setVolume();
    }

    function loadSong(index) {
        currentIndex = index;
        audio.src = musicFiles[index];
        trackTitle.innerText = `Track ${String(index + 1).padStart(2, '0')}`;
        coverIcon.className = `fas ${natureIcons[Math.floor(Math.random() * natureIcons.length)]}`;
        updatePlaylistUI();
    }

    function updatePlaylistUI() {
        const filterText = searchInput.value.toLowerCase();
        playlistEl.innerHTML = "";
        musicFiles.forEach((file, index) => {
            const trackNum = String(index + 1).padStart(2, '0');
            if (trackNum.includes(filterText) || file.toLowerCase().includes(filterText)) {
                const li = document.createElement('li');
                if (index === currentIndex) li.classList.add('active');
                li.innerHTML = `<i class="fas fa-leaf"></i> Track ${trackNum}`;
                li.onclick = () => { loadSong(index); playSong(); };
                playlistEl.appendChild(li);
            }
        });
    }

    function playSong() { isPlaying = true; playBtn.innerHTML = '<i class="fas fa-pause-circle"></i>'; audio.play(); }
    function pauseSong() { isPlaying = false; playBtn.innerHTML = '<i class="fas fa-play-circle"></i>'; audio.pause(); }

    playBtn.addEventListener('click', () => isPlaying ? pauseSong() : playSong());
    document.getElementById('btnNext').addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % musicFiles.length;
        loadSong(currentIndex); playSong();
    });
    document.getElementById('btnPrev').addEventListener('click', () => {
        currentIndex = (currentIndex - 1 + musicFiles.length) % musicFiles.length;
        loadSong(currentIndex); playSong();
    });

    audio.addEventListener('timeupdate', () => {
        const percent = (audio.currentTime / audio.duration) * 100;
        if(!isNaN(percent)) progressBar.value = percent;
    });

    progressBar.addEventListener('input', () => audio.currentTime = (progressBar.value / 100) * audio.duration);
    volumeBar.addEventListener('input', setVolume);
    function setVolume() { audio.volume = volumeBar.value / 100; }
    searchInput.addEventListener('input', updatePlaylistUI);

    window.onload = initPlayer;

    // --- PWA Service Worker 註冊 ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA SW Registered'))
                .catch(err => console.log('SW Registration Failed', err));
        });
    }
</script>
</body>
</html>
